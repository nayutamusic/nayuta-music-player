<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>NAYUTA MUSIC Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      background: #09090e;
      color: #e8e0d0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    /* ヘッダー */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px 11px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: relative;
      z-index: 10;
    }
    .logo-area {
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .logo-img {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
    }
    .logo-text {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2.5px;
      color: #c8a040;
      text-transform: uppercase;
    }
    .hamburger {
      width: 34px;
      height: 34px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border-radius: 7px;
      transition: background 0.2s;
      position: relative;
      z-index: 200;
    }
    .hamburger:hover { background: rgba(255,255,255,0.07); }
    .hamburger span {
      display: block;
      width: 16px;
      height: 1.5px;
      background: #888;
      border-radius: 2px;
    }

    /* ジャンルドロップダウン */
    .genre-menu {
      position: absolute;
      top: 56px;
      right: 10px;
      width: 190px;
      background: #141420;
      border: 1px solid rgba(200,160,64,0.2);
      border-radius: 11px;
      overflow: hidden;
      z-index: 999;
      display: none;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
      max-height: 360px;
      overflow-y: auto;
    }
    .genre-menu::-webkit-scrollbar { width: 4px; }
    .genre-menu::-webkit-scrollbar-thumb { background: rgba(200,160,64,0.3); border-radius: 4px; }
    .genre-menu.open { display: block; }
    .genre-item {
      padding: 10px 15px;
      font-size: 12.5px;
      cursor: pointer;
      color: #999;
      transition: all 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .genre-item:last-child { border-bottom: none; }
    .genre-item:hover { background: rgba(200,160,64,0.12); color: #c8a040; }
    .genre-item.active { color: #c8a040; background: rgba(200,160,64,0.09); font-weight: 600; }

    /* サムネエリア */
    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
      cursor: pointer;
    }
    .player-wrap:hover .thumb-overlay { opacity: 1; }
    #thumbImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .thumb-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .thumb-overlay-icon {
      width: 56px;
      height: 56px;
      background: rgba(200,160,64,0.92);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .player-cover {
      position: absolute;
      inset: 0;
      background: #09090e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: opacity 0.3s;
    }
    .player-cover.hidden { opacity: 0; pointer-events: none; }
    .cover-logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      opacity: 0.6;
    }
    .cover-text { font-size: 11px; color: #444; letter-spacing: 1px; }

    /* 曲情報バー */
    .info-bar {
      padding: 10px 16px 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 38px;
    }
    .genre-pill {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #09090e;
      background: #c8a040;
      padding: 2px 9px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .track-num { font-size: 11px; color: #555; white-space: nowrap; }

    /* コントロール */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 6px 16px 14px;
    }
    .ctrl-btn {
      width: 38px;
      height: 38px;
      border: none;
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #888;
      transition: all 0.15s;
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.11); color: #ddd; }
    .play-btn {
      width: 54px;
      height: 54px;
      background: linear-gradient(135deg, #c8a040, #7a5010);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      transition: all 0.15s;
      box-shadow: 0 4px 18px rgba(200,160,64,0.35);
    }
    .play-btn:hover { transform: scale(1.06); box-shadow: 0 6px 22px rgba(200,160,64,0.45); }
    .play-btn:active { transform: scale(0.96); }

    /* シャッフル */
    .bottom-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 16px;
    }
    .hint-text { font-size: 10px; color: #333; letter-spacing: 0.5px; }
    .shuffle-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: #444;
      transition: color 0.15s;
    }
    .shuffle-btn.on { color: #c8a040; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-area">
      <img class="logo-img" src="icons/logo.png" alt="NAYUTA">
      <div class="logo-text">NAYUTA MUSIC</div>
    </div>
    <div class="hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </div>
  </div>

  <div class="genre-menu" id="genreMenu"></div>

  <div class="player-wrap" id="playerWrap" onclick="openCurrent()">
    <img id="thumbImg" src="" alt="thumbnail" style="display:none;">
    <div class="thumb-overlay">
      <div class="thumb-overlay-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="white"><polygon points="5,2 17,10 5,18"/></svg>
      </div>
    </div>
    <div class="player-cover" id="playerCover">
      <img class="cover-logo" src="icons/logo.png" alt="NAYUTA">
      <div class="cover-text">ジャンルを選んで再生</div>
    </div>
  </div>

  <div class="info-bar">
    <div class="genre-pill" id="genrePill" style="display:none"></div>
    <div class="track-num" id="trackNum">—</div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="prevBtn" title="前の曲">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
        <rect x="1" y="2" width="2.5" height="11" rx="1.2"/>
        <polygon points="13,2 5,7.5 13,13"/>
      </svg>
    </button>
    <button class="play-btn" id="playBtn">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="white"><polygon points="5,2 17,10 5,18"/></svg>
    </button>
    <button class="ctrl-btn" id="nextBtn" title="次の曲">
      <svg width="15" height="15" viewBox="0 0 15 15" fill="currentColor">
        <polygon points="2,2 10,7.5 2,13"/>
        <rect x="11.5" y="2" width="2.5" height="11" rx="1.2"/>
      </svg>
    </button>
  </div>

  <div class="bottom-row">
    <div class="hint-text">クリックでYouTubeで開く</div>
    <button class="shuffle-btn on" id="shuffleBtn" title="シャッフル">⇄</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
